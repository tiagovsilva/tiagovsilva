name: Script bug
description: Report reproducible incorrect behavior in a published script.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: Do not include credentials, real tenant data, user data, internal names, IP addresses, or logs containing sensitive information.
  - type: input
    id: script
    attributes:
      label: Script path
      placeholder: powershell-infrastructure-automation/cloud/entra-id/example.ps1
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: PowerShell runtime
      options:
        - Windows PowerShell 5.1 / Desktop
        - PowerShell 7.4 / Core
        - Other
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
      description: Provide sanitized error text and the smallest reproducible command.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: test_environment
    attributes:
      label: Controlled test environment
      description: Describe the sanitized lab, sandbox, test tenant, test OU, or limited non-production scope used.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I removed credentials, identifiers, personal data, and internal infrastructure details.
          required: true
