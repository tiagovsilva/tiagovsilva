name: Script request
description: Propose a reusable infrastructure automation script.
title: "[Request]: "
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Cloud
        - Hybrid
        - On-premises
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the reusable operational problem without organization-specific details.
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Expected inputs and outcome
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Proposed controlled validation
      description: Explain how the script can be tested safely before production and how changes can be rolled back.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: This request contains no secrets, personal data, or internal infrastructure identifiers.
          required: true
