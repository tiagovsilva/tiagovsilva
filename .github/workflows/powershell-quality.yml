name: PowerShell quality

on:
  push:
    paths:
      - "powershell-infrastructure-automation/**"
      - ".github/workflows/powershell-quality.yml"
  pull_request:
    paths:
      - "powershell-infrastructure-automation/**"
      - ".github/workflows/powershell-quality.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate with Windows PowerShell 5.1
        shell: powershell
        run: .\powershell-infrastructure-automation\tests\Test-Repository.ps1

      - name: Validate with PowerShell 7
        shell: pwsh
        run: .\powershell-infrastructure-automation\tests\Test-Repository.ps1

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -SkipPublisherCheck
          $results = Invoke-ScriptAnalyzer `
            -Path .\powershell-infrastructure-automation `
            -Recurse `
            -Settings .\powershell-infrastructure-automation\PSScriptAnalyzerSettings.psd1

          if ($results) {
            $results | Format-Table RuleName, Severity, ScriptName, Line, Message -Wrap
            throw "PSScriptAnalyzer returned $($results.Count) finding(s)."
          }

